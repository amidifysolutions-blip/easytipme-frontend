<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyTipMe — Contact us</title>
<style>
  :root{--blue:#0071e3;--ink:#0a0a0a;--soft:#8a8a90;--line:#e7e7ec;--bg:#f5f6f9;--card:#ffffff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;padding:22px 14px 50px}
  .wrap{max-width:560px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;justify-content:center;margin-bottom:6px}
  .brand .mark{width:30px;height:30px}
  .head{text-align:center;margin-bottom:22px}
  .head h1{font-size:26px;margin:14px 0 6px;letter-spacing:-.02em}
  .head p{color:var(--soft);font-size:15px;margin:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;
    box-shadow:0 2px 14px rgba(0,0,0,.04)}
  label{display:block;font-size:13px;font-weight:600;color:#444;margin:14px 0 6px}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;
    font-size:15px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--blue)}
  textarea{min-height:130px;resize:vertical}
  .btn{width:100%;margin-top:18px;background:var(--blue);color:#fff;border:0;border-radius:13px;
    padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s}
  .btn:disabled{opacity:.55;cursor:default}
  .msg{margin-top:14px;font-size:14px;text-align:center;min-height:20px}
  .msg.ok{color:#12864b}.msg.err{color:#d23b3b}
  .alt{text-align:center;color:var(--soft);font-size:14px;margin-top:18px;line-height:1.7}
  .alt a{color:var(--blue);text-decoration:none;font-weight:600}
  .done{text-align:center;padding:20px 0}
  .done .big{font-size:46px}
  .back{display:inline-block;margin-top:22px;text-align:center;color:var(--soft);font-size:14px;text-decoration:none}
  .back:hover{color:var(--blue)}
  .center{text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">
      <span class="mark"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00c2ff"/><stop offset="1" stop-color="#0071e3"/></linearGradient></defs><rect width="100" height="100" rx="24" fill="#0a0a0a"/><rect x="30" y="26" width="10" height="48" rx="5" fill="url(#lg)"/><rect x="30" y="26" width="34" height="10" rx="5" fill="url(#lg)"/><rect x="30" y="64" width="34" height="10" rx="5" fill="url(#lg)"/><rect x="30" y="45" width="22" height="10" rx="5" fill="url(#lg)"/><circle cx="63" cy="50" r="9" fill="#fff"/><circle cx="63" cy="50" r="4.5" fill="url(#lg)"/></svg></span>
      EasyTipMe
    </div>
    <h1>Get in touch</h1>
    <p>Questions, help, or feedback — we'd love to hear from you.</p>
  </div>

  <div class="card" id="formCard">
    <form id="cform">
      <label for="c_name">Your name</label>
      <input id="c_name" type="text" autocomplete="name" placeholder="Full name">

      <label for="c_email">Email</label>
      <input id="c_email" type="email" autocomplete="email" placeholder="you@example.com" required>

      <label for="c_role">I am a…</label>
      <select id="c_role">
        <option value="">Select (optional)</option>
        <option>Business owner</option>
        <option>Team member / worker</option>
        <option>Customer</option>
        <option>Other</option>
      </select>

      <label for="c_subject">Subject</label>
      <input id="c_subject" type="text" placeholder="What's this about?">

      <label for="c_message">Message</label>
      <textarea id="c_message" placeholder="How can we help?" required></textarea>

      <button class="btn" id="c_btn" type="submit">Send message</button>
      <div id="c_msg" class="msg"></div>
    </form>
    <div class="alt">Prefer email? Write us at <a href="mailto:support@easytipme.com">support@easytipme.com</a></div>
  </div>

  <div class="card done hide" id="doneCard" style="display:none">
    <div class="big">✅</div>
    <h1 style="font-size:22px;margin:8px 0">Message sent!</h1>
    <p style="color:var(--soft)">Thanks for reaching out — we'll get back to you at the email you provided. A confirmation is on its way to your inbox.</p>
  </div>

  <div class="center"><a class="back" href="index.html">← Back to EasyTipMe</a></div>
</div>

<script>
  const BACKEND="https://easytipme-backend.onrender.com";
  const $=id=>document.getElementById(id);
  $('cform').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name=$('c_name').value.trim(), email=$('c_email').value.trim(), role=$('c_role').value,
          subject=$('c_subject').value.trim(), message=$('c_message').value.trim();
    if(!/.+@.+\..+/.test(email)){ show('Please enter a valid email.','err'); return; }
    if(!message){ show('Please write a message.','err'); return; }
    const btn=$('c_btn'); btn.disabled=true; btn.textContent='Sending…'; show('','');
    try{
      const r=await fetch(BACKEND+'/contact',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,email,role,subject,message})});
      const j=await r.json().catch(()=>({}));
      if(j&&j.sent===1){ $('formCard').style.display='none'; $('doneCard').style.display='block'; window.scrollTo(0,0); }
      else { show("Couldn't send right now. Please email support@easytipme.com directly.",'err'); btn.disabled=false; btn.textContent='Send message'; }
    }catch(_){ show("Couldn't send right now. Please email support@easytipme.com directly.",'err'); btn.disabled=false; btn.textContent='Send message'; }
  });
  function show(t,cls){ const m=$('c_msg'); m.textContent=t; m.className='msg '+(cls||''); }
</script>
</body>
</html>
